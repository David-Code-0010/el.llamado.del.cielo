<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAPPY SHARK - VINI'S WORLD</title>
  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
  
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            width:100%; height:100%; overflow:hidden;
        }
        body {
            font-family:'VT323','Segoe UI',monospace;
            background:#4a7ba7 url('https://raw.githubusercontent.com/David-Code-0010/el.llamado.del.cielo/main/fondo_frutiger.png') center/cover fixed no-repeat;
            color:#333;
            position:relative;
            font-weight:bold;
            font-style:italic;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background:linear-gradient(180deg, #4a7ba7 0%, #6eb4d6 70%, #8cc5e1 100%);
            z-index:-2;
        }
        body::after {
            content:''; position:fixed; inset:0;
            background: radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.08), transparent 40%),
                        radial-gradient(ellipse at 80% 70%, rgba(0,0,0,0.05), transparent 50%),
                        linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.03) 50%);
            background-size:100% 100%,100% 100%,100% 4px;
            pointer-events:none; z-index:-1;
        }

        .container {
            max-width:900px; margin:0 auto; position:relative; z-index:10; padding:10px;
        }

        .top-bar {
            display:flex; justify-content:space-between; align-items:center;
            background:linear-gradient(180deg, #0072c6 0%, #005fa6 100%);
            border:2px solid rgba(255,255,255,0.9); border-radius:6px; color:white;
            font-size:1.3rem; margin-bottom:12px;
            box-shadow:0 4px 12px rgba(0,114,198,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
            padding:8px 15px; height:48px;
        }
        .game-title {
            font-size:1.8rem; white-space:nowrap;
            background:linear-gradient(to right, #ffffff 0%, #ffffff 45%, #00bfff 50%, #ffffff 55%, #ffffff 100%);
            background-size:200% auto; background-clip:text; -webkit-background-clip:text;
            -webkit-text-fill-color:transparent; animation:blueShine 3s linear infinite reverse;
        }
        @keyframes blueShine { to { background-position:200% center; } }

        .window {
            background:linear-gradient(180deg, rgba(255,255,255,0.97) 0%, rgba(248,250,252,0.96) 40%, rgba(240,245,250,0.95) 100%);
            border:1px solid rgba(0,0,0,0.15); border-radius:8px;
            box-shadow:0 4px 16px rgba(0,114,198,0.3), inset 0 1px 0 rgba(255,255,255,0.9);
            overflow:hidden;
        }
        .window-header {
            background:linear-gradient(180deg, #0072c6 0%, #005fa6 100%);
            color:white; padding:8px 12px; font-size:1.2rem; font-weight:bold;
            display:flex; justify-content:space-between; align-items:center;
        }
        .window-body {
            padding:15px; background:#a8d8ff; position:relative;
            display:flex; align-items:center; justify-content:center;
        }

        canvas {
            border-radius:8px;
            box-shadow:0 4px 15px rgba(0,80,150,0.5);
            max-width:100%;
            image-rendering:pixelated;
        }

        .score {
            position:absolute; top:25px; left:50%; transform:translateX(-50%);
            font-size:3.5rem; color:#ffffff; text-shadow:0 0 15px #00bfff;
            z-index:20; pointer-events:none;
        }

        .back-btn {
            position:absolute; top:15px; left:15px; z-index:30;
            background:linear-gradient(180deg,#f8f8f8,#e8e8e8); border:1px solid #bfbfbf;
            border-radius:6px; padding:8px 16px; cursor:pointer;
            box-shadow:0 2px 8px rgba(0,0,0,0.15); transition:all 0.2s;
        }
        .back-btn:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,114,198,0.3); }

        @media (max-width:768px) {
            .container { padding:5px; }
            .window-body { padding:8px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Volver</a>

    <div class="container">
        <div class="top-bar">
            <div class="game-title">FLAPPY SHARK 🦈</div>
            <div>Puntuación: <span id="scoreDisplay">0</span></div>
        </div>

        <div class="window">
            <div class="window-header">
                <span>🌊 Aguas Cristalinas - Evita las algas</span>
                <button onclick="location.reload()">↻ Reiniciar</button>
            </div>
            <div class="window-body">
                <div class="score" id="score">0</div>
                <canvas id="canvas" width="360" height="640"></canvas>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        let birdX = 90, birdY = 300, velocity = 0, gravity = 0.45, jump = -11.5;
        let pipes = [], score = 0, gameOver = false, frame = 0;
        let pipeSpeed = 2.2, pipeGap = 170, pipeWidth = 65;

        // Responsive canvas (mantiene proporción 360x640)
        function resize() {
            const maxW = Math.min(window.innerWidth * 0.92, 420);
            canvas.style.width = maxW + 'px';
            canvas.style.height = (maxW * 640 / 360) + 'px';
        }
        window.addEventListener('resize', resize);
        resize();

        function spawnPipe() {
            const top = Math.random() * (canvas.height - pipeGap - 140) + 60;
            pipes.push({ x: canvas.width + 50, top: top });
        }

        function drawBackground() {
            // Aguas cristalinas
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#7dd3fc');
            grad.addColorStop(1, '#0284c7');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Burbujas sutiles
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            for (let i = 0; i < 8; i++) {
                ctx.beginPath();
                ctx.arc(50 + i*45, 80 + (frame % 120), 8, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function drawShark() {
            ctx.save();
            ctx.translate(birdX, birdY);
            ctx.rotate(Math.min(Math.max(velocity * 0.07, -0.8), 1.2));
            ctx.font = '68px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🦈', 0, 22);
            ctx.restore();
        }

        function drawPipes() {
            ctx.fillStyle = '#065f46';
            ctx.strokeStyle = '#052e1f';
            ctx.lineWidth = 6;
            pipes.forEach(p => {
                // Alga superior
                ctx.fillRect(p.x, 0, pipeWidth, p.top);
                ctx.strokeRect(p.x, 0, pipeWidth, p.top);
                // Alga inferior
                ctx.fillRect(p.x, p.top + pipeGap, pipeWidth, canvas.height);
                ctx.strokeRect(p.x, p.top + pipeGap, pipeWidth, canvas.height);
            });
        }

        function update() {
            if (gameOver) return;

            velocity += gravity;
            birdY += velocity;

            // Mover algas
            pipes.forEach((p, i) => {
                p.x -= pipeSpeed;
                if (p.x + pipeWidth < 0) pipes.splice(i, 1);
                if (p.x + pipeWidth / 2 < birdX && !p.passed) {
                    score++; p.passed = true;
                }
            });

            // Colisión
            if (birdY < 0 || birdY > canvas.height - 40) gameOver = true;
            for (let p of pipes) {
                if (birdX + 32 > p.x && birdX - 32 < p.x + pipeWidth) {
                    if (birdY - 28 < p.top || birdY + 28 > p.top + pipeGap) gameOver = true;
                }
            }

            if (gameOver) {
                alert(`¡Game Over! 🦈\nPuntuación final: ${score}`);
            }

            scoreEl.textContent = score;
            document.getElementById('scoreDisplay').textContent = score;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawPipes();
            drawShark();
            update();

            if (frame % 75 === 0) spawnPipe();
            frame++;

            requestAnimationFrame(draw);
        }

        // Controles (funciona en teléfono y PC)
        function flap() {
            if (!gameOver) velocity = jump;
        }
        canvas.addEventListener('click', flap);
        canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); });
        document.addEventListener('keydown', e => { if (e.code === 'Space') flap(); });

        // Iniciar
        spawnPipe();
        draw();
    </script>
</body>
</html>
