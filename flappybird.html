<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAPPY SHARK - VINI'S WORLD</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            width:100%; height:100%; overflow:hidden;
        }
        body {
            font-family:'VT323', 'Segoe UI', monospace;
            background:#4a7ba7 url('https://raw.githubusercontent.com/David-Code-0010/el.llamado.del.cielo/main/fondo_frutiger.png') center/cover fixed no-repeat;
            color:#333;
            position:relative;
            font-weight:bold;
            font-style:italic;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background:linear-gradient(180deg, #4a7ba7 0%, #6eb4d6 70%, #8cc5e1 100%);
            z-index:-2;
        }
        body::after {
            content:''; position:fixed; inset:0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.08), transparent 40%),
                radial-gradient(ellipse at 80% 70%, rgba(0,0,0,0.05), transparent 50%),
                linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.03) 50%);
            background-size:100% 100%,100% 100%,100% 4px;
            pointer-events:none; z-index:-1;
        }

        .container {
            max-width:900px; margin:0 auto; position:relative; z-index:10; padding:10px;
        }

        .top-bar {
            display:flex; justify-content:space-between; align-items:center;
            background:linear-gradient(180deg, #0072c6 0%, #005fa6 100%);
            border:2px solid rgba(255,255,255,0.9); border-radius:6px; color:white;
            font-size:1.3rem; margin-bottom:12px;
            box-shadow:0 4px 12px rgba(0,114,198,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
            padding:8px 15px; height:48px;
        }
        .game-title {
            font-size:1.8rem; white-space:nowrap;
            background:linear-gradient(to right, #ffffff 0%, #ffffff 45%, #00bfff 50%, #ffffff 55%, #ffffff 100%);
            background-size:200% auto; background-clip:text; -webkit-background-clip:text;
            -webkit-text-fill-color:transparent; animation:blueShine 3s linear infinite reverse;
        }
        @keyframes blueShine { to { background-position:200% center; } }

        .window {
            background:linear-gradient(180deg, rgba(255,255,255,0.97) 0%, rgba(248,250,252,0.96) 40%, rgba(240,245,250,0.95) 100%);
            border:1px solid rgba(0,0,0,0.15); border-radius:8px;
            box-shadow:0 4px 16px rgba(0,114,198,0.3), inset 0 1px 0 rgba(255,255,255,0.9);
            overflow:hidden;
        }
        .window-header {
            background:linear-gradient(180deg, #0072c6 0%, #005fa6 100%);
            color:white; padding:8px 12px; font-size:1.2rem; font-weight:bold;
            display:flex; justify-content:space-between; align-items:center;
            text-shadow:0 1px 2px rgba(0,0,0,0.4);
        }
        .window-body {
            padding:15px; min-height:60vh;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            position:relative;
        }

        canvas {
            background:#a8d8ff; /* aguas cristalinas de base */
            border-radius:8px;
            box-shadow:0 4px 15px rgba(0,80,150,0.4);
            max-width:100%;
        }

        .score {
            position:absolute; top:20px; left:50%; transform:translateX(-50%);
            font-size:3rem; color:#ffffff; text-shadow:0 0 10px #00bfff, 0 0 20px #00bfff;
            z-index:20; pointer-events:none;
        }

        .back-btn {
            position:absolute; top:15px; left:15px; z-index:30;
            background:linear-gradient(180deg,#f8f8f8,#e8e8e8); border:1px solid #bfbfbf;
            border-radius:6px; padding:8px 16px; cursor:pointer;
            box-shadow:0 2px 8px rgba(0,0,0,0.15); transition:all 0.2s;
        }
        .back-btn:hover {
            background:linear-gradient(180deg,#ffffff,#f0f0f0); transform:translateY(-2px);
            box-shadow:0 4px 12px rgba(0,114,198,0.3);
        }

        ::-webkit-scrollbar { width:12px; }
        ::-webkit-scrollbar-track { background:rgba(255,255,255,0.15); }
        ::-webkit-scrollbar-thumb { background:rgba(0,114,198,0.7); border-radius:6px; border:2px solid rgba(255,255,255,0.4); }

        @media (max-width:768px) {
            .container { padding:5px; }
            .window-body { min-height:70vh; padding:10px; }
            .top-bar { font-size:1.1rem; height:42px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Volver</a>

    <div class="container">
        <div class="top-bar">
            <div class="game-title">FLAPPY SHARK</div>
            <div>Puntuación: <span id="scoreDisplay">0</span></div>
        </div>

        <div class="window">
            <div class="window-header">
                <span>JUGANDO: FLAPPY SHARK 🦈</span>
                <button onclick="location.reload()">↻ Reiniciar</button>
            </div>
            <div class="window-body">
                <div class="score" id="score">0</div>
                <canvas id="canvas" width="400" height="600"></canvas>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // Ajuste responsive del canvas
        function resizeCanvas() {
            const maxW = Math.min(window.innerWidth * 0.9, 450);
            const aspect = 400 / 600;
            canvas.width = maxW;
            canvas.height = maxW / aspect;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Variables del juego
        let birdX = 100;
        let birdY = 300;
        let birdVelocity = 0;
        let gravity = 0.5;
        let jumpPower = -10;
        let pipes = [];
        let score = 0;
        let gameOver = false;
        let frame = 0;

        // Fondo aguas cristalinas (gradiente + burbujas simples)
        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#7dd3fc');
            grad.addColorStop(0.4, '#38bdf8');
            grad.addColorStop(1, '#0284c7');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Algas marinas (obstáculos)
            ctx.fillStyle = '#065f46';
            pipes.forEach(pipe => {
                // Tubo superior (alga invertida)
                ctx.fillRect(pipe.x, 0, 70, pipe.top);
                // Tubo inferior (alga normal)
                ctx.fillRect(pipe.x, canvas.height - pipe.bottom, 70, pipe.bottom);
            });
        }

        // Tiburón (emoji estilizado simple)
        function drawShark() {
            ctx.font = '60px Arial';
            ctx.fillText('🦈', birdX - 30, birdY + 20);
            // Opcional: rotación según velocidad
            ctx.save();
            ctx.translate(birdX, birdY);
            ctx.rotate(birdVelocity * 0.05);
            ctx.fillText('🦈', -30, 20);
            ctx.restore();
        }

        // Generar algas (pipes)
        function spawnPipe() {
            const gap = 180;
            const minHeight = 80;
            const maxHeight = canvas.height - gap - minHeight;
            const top = Math.floor(Math.random() * (maxHeight - minHeight) + minHeight);
            pipes.push({ x: canvas.width, top: top, bottom: canvas.height - top - gap });
        }

        // Colisión
        function checkCollision() {
            if (birdY < 0 || birdY > canvas.height) return true;
            for (let pipe of pipes) {
                if (birdX + 30 > pipe.x && birdX - 30 < pipe.x + 70) {
                    if (birdY - 30 < pipe.top || birdY + 30 > canvas.height - pipe.bottom) {
                        return true;
                    }
                }
            }
            return false;
        }

        // Game loop
        function update() {
            if (gameOver) return;

            birdVelocity += gravity;
            birdY += birdVelocity;

            if (frame % 90 === 0) spawnPipe();
            frame++;

            // Mover algas
            pipes.forEach(pipe => {
                pipe.x -= 2;
                if (pipe.x + 70 < 0) pipes.shift();
                if (pipe.x + 35 === birdX) score++;
            });

            if (checkCollision()) {
                gameOver = true;
                alert(`¡Game Over! Puntuación: ${score}`);
            }

            scoreElement.textContent = score;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawShark();
            update();
            requestAnimationFrame(draw);
        }

        // Salto con click o espacio
        canvas.addEventListener('click', () => { if (!gameOver) birdVelocity = jumpPower; });
        document.addEventListener('keydown', e => { if (e.code === 'Space' && !gameOver) birdVelocity = jumpPower; });

        spawnPipe(); // Primera alga
        draw();
    </script>
</body>
</html>
