<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vini's Tetris - Frutiger Aero</title>
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'>
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

<style>
    /* =========================================
       1. VARIABLES RESPONSIVAS
       ========================================= */
    :root {
        --scale-factor: 1;
    }

    @media (max-height: 850px) { :root { --scale-factor: 0.85; } }
    @media (max-height: 700px) { :root { --scale-factor: 0.7; } }
    @media (max-width: 600px) { :root { --scale-factor: 0.85; } }
    @media (max-width: 450px) { :root { --scale-factor: 0.7; } }
    @media (max-width: 380px) { :root { --scale-factor: 0.6; } }

    /* =========================================
       2. ESTILO GENERAL FRUTIGER AERO AZUL
       ========================================= */
    body {
        background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
        background-image: 
            radial-gradient(circle at 15% 50%, rgba(255, 255, 255, 0.4) 0%, transparent 10%),
            radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.3) 0%, transparent 15%),
            radial-gradient(circle at 50% 80%, rgba(255, 255, 255, 0.5) 0%, transparent 20%),
            linear-gradient(135deg, #a1c4fd 0%, #e0f2fe 100%);
        font-family: 'Segoe UI', 'Varela Round', Tahoma, Geneva, Verdana, sans-serif;
        color: #00509e;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    /* BOTÓN VOLVER */
    #btn-volver {
        position: absolute;
        top: 20px;
        left: 20px;
        text-decoration: none;
        color: #0077b6;
        background: rgba(255, 255, 255, 0.5);
        padding: 10px 20px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.8);
        font-weight: bold;
        font-size: 1.1rem;
        box-shadow: 0 4px 10px rgba(0, 119, 182, 0.2), inset 0 2px 5px rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s ease;
    }

    #btn-volver:hover {
        transform: scale(1.05);
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 6px 15px rgba(0, 119, 182, 0.3), inset 0 2px 5px rgba(255, 255, 255, 0.8);
    }

    #btn-volver:active {
        transform: scale(0.95);
    }

    @media (max-width: 600px) {
        #btn-volver {
            top: 10px;
            left: 10px;
            padding: 8px 15px;
            font-size: 1rem;
        }
    }

    /* Contenedor Principal */
    #outer-board {
        display: flex;
        gap: 20px;
        align-items: flex-start;
        padding: 20px;
        background: rgba(255, 255, 255, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 20px;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2), inset 0 0 20px rgba(255,255,255,0.5);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transform: scale(var(--scale-factor));
        transform-origin: center;
    }

    /* =========================================
       3. TABLERO DE JUEGO
       ========================================= */
    #board {
        position: relative;
        width: 300px;
        height: 600px;
        background: rgba(255, 255, 255, 0.4);
        border: 2px solid rgba(255, 255, 255, 0.8);
        border-radius: 10px;
        box-shadow: inset 0 0 20px rgba(0, 162, 255, 0.2);
        overflow: hidden;
    }

    .empty {
        width: 30px;
        height: 30px;
        position: absolute;
        box-sizing: border-box;
    }

    .block {
        width: 30px;
        height: 30px;
        position: absolute;
        box-sizing: border-box;
        z-index: 10;
        transition: top 0.1s linear, left 0.1s linear;
    }

    .inner-tile {
        width: 100%;
        height: 100%;
        background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 5px;
        box-sizing: border-box;
        position: relative;
        box-shadow: inset 0 -3px 5px rgba(0,0,0,0.15), 0 2px 4px rgba(0,0,0,0.2);
    }

    .inner-inner-tile {
        position: absolute;
        top: 1px; left: 1px; right: 1px;
        height: 45%;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0) 100%);
        border-radius: 3px 3px 0 0;
        pointer-events: none;
    }

    /* =========================================
       4. UI & MENSAJES
       ========================================= */
    #banner {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(5px);
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 100;
        text-align: center;
    }

    #message {
        font-size: 3.5rem;
        font-weight: 800;
        color: #0077b6;
        text-shadow: 0 4px 10px rgba(255, 255, 255, 0.8), 2px 2px 0 #fff;
        margin-bottom: 20px;
        letter-spacing: 2px;
    }

    #new-game {
        font-family: inherit;
        font-size: 1.2rem;
        font-weight: bold;
        background: linear-gradient(180deg, #48cae4 0%, #0077b6 100%);
        color: white;
        padding: 12px 25px;
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 30px;
        cursor: pointer;
        animation: parpadeo 2s infinite;
        box-shadow: 0 4px 15px rgba(0, 119, 182, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.6);
        text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }
    
    @keyframes parpadeo { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

    /* =========================================
       5. PUNTUACIÓN Y CONTROLES
       ========================================= */
    #stats {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 120px;
        align-items: center;
    }

    .labels {
        font-size: 1.5rem;
        font-weight: bold;
        text-align: center;
        width: 100%;
        color: #00509e;
        text-shadow: 1px 1px 0 #fff;
    }

    .frame {
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 8px;
        padding: 10px;
        font-size: 1.8rem;
        text-align: right;
        margin-top: 5px;
        color: #0077b6;
        box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
    }

    .btn {
        width: 60px; height: 60px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.8);
        background: linear-gradient(180deg, #e0f7fa 0%, #90e0ef 100%);
        color: #0077b6;
        font-size: 1.5rem;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0, 119, 182, 0.2), inset 0 2px 5px rgba(255, 255, 255, 0.9);
        transition: transform 0.1s, background 0.2s;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .btn:active {
        transform: scale(0.92);
        background: linear-gradient(180deg, #90e0ef 0%, #e0f7fa 100%);
        box-shadow: 0 2px 5px rgba(0, 119, 182, 0.2), inset 0 3px 6px rgba(0, 0, 0, 0.1);
    }

    @media (max-width: 600px) {
        #outer-board { flex-direction: column; align-items: center; padding: 15px; }
        #stats { flex-direction: row; flex-wrap: wrap; justify-content: center; width: 100%; }
        .labels { width: auto; display: flex; align-items: center; gap: 10px; }
        .frame { margin-top: 0; padding: 5px 15px; }
    }
</style>
</head>
<body>

<a href="index.html" id="btn-volver">
    <i class="fas fa-arrow-left"></i> Volver
</a>

<div id="outer-board">
  <div id="board"> 
    <div id="banner">
      <div> 
        <div id="message">AERO<br>TETRIS</div>
        <button id="new-game">START GAME</button>
      </div>
    </div>
    
    <script>
        for(let i=0; i<200; i++) {
            document.write('<div class="empty"><div class="inner-tile" style="opacity:0.2; background:none; border:1px solid #ffffff; box-shadow:none;"></div></div>');
        }
    </script>
  </div>

  <div id="stats">
    <div class="labels">SCORE
      <div class="frame" id="score">0</div>
    </div>
    <div style="display:flex; gap:10px; width:100%; justify-content: center;">
        <button class="btn" id="left"><i class="fas fa-arrow-left"></i></button>
        <button class="btn" id="rotate"><i class="fas fa-redo"></i></button>
        <button class="btn" id="right"><i class="fas fa-arrow-right"></i></button>
    </div>
    <button class="btn" id="down"><i class="fas fa-arrow-down"></i></button>
  </div>
</div>

<script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js'></script>

<script>
/* =========================================
   LÓGICA DEL JUEGO
   ========================================= */

class Position {
  constructor(x, y) {
    this.x = x;
    this.y = y;
  }
}

class Block {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    let block = document.createElement("div");
    block.setAttribute("class", "block");
    $(block).append("<div class='inner-tile'><div class='inner-inner-tile'></div></div>");
    this.element = block;
  }

  init() { $("#board").append(this.element); }

  render() {
    $(this.element).css({
      left: this.y * 30 + "px",
      top: this.x * 30 + "px"
    });
  }

  fall() { this.x += 1; }
  moveRight() { this.y += 1; }
  moveLeft() { this.y -= 1; }

  rightPosition() { return new Position(this.x, this.y + 1); }
  leftPosition() { return new Position(this.x, this.y - 1); }
  getPosition() { return new Position(this.x, this.y); }

  destroy() { $(this.element).remove(); }
}

class Shape {
  constructor(blocks) { this.blocks = blocks; }
  getBlocks() { return Array.from(this.blocks); }
  init() { for (let block of this.blocks) block.init(); }
  render() { for (let block of this.blocks) block.render(); }
  fallingPositions() { return this.blocks.map(b => b.getPosition()).map(p => new Position(p.x + 1, p.y)); }
  fall() { for (let block of this.blocks) block.fall(); }
  rightPositions() { return this.blocks.map(b => b.rightPosition()); }
  leftPositions() { return this.blocks.map(b => b.leftPosition()); }
  moveRight() { for (let block of this.blocks) block.moveRight(); }
  moveLeft() { for (let block of this.blocks) block.moveLeft(); }
  clear() {
    for (let block of this.blocks) block.destroy();
    this.blocks = [];
  }
  addBlocks(blocks) { for (let block of blocks) this.blocks.push(block); }
  rotate() {}
  rotatePositions() { return []; }
}

class Square extends Shape {
  constructor(x, y) { super([new Block(x, y), new Block(x, y + 1), new Block(x + 1, y), new Block(x + 1, y + 1)]); }
}

class LShape extends Shape {
  constructor(x, y) { super([new Block(x, y), new Block(x - 1, y), new Block(x + 1, y), new Block(x + 1, y + 1)]); this.position = 0; }
  rotate() {
    let blocks = this.rotatePositions().map(p => new Block(p.x, p.y));
    this.clear(); this.addBlocks(blocks); this.position = this.getNextPosition();
  }
  rotatePositions() {
    let pos = this.getBlocks()[0].getPosition(); let x = pos.x, y = pos.y; let positions = [];
    switch (this.getNextPosition()) {
      case 0: positions = [new Position(x,y), new Position(x-1,y), new Position(x+1,y), new Position(x+1,y+1)]; break;
      case 1: positions = [new Position(x,y), new Position(x,y-1), new Position(x,y+1), new Position(x+1,y-1)]; break;
      case 2: positions = [new Position(x,y), new Position(x-1,y-1), new Position(x-1,y), new Position(x+1,y)]; break;
      case 3: positions = [new Position(x,y), new Position(x,y-1), new Position(x,y+1), new Position(x-1,y+1)]; break;
    }
    return positions;
  }
  getNextPosition() { return (this.position + 1) % 4; }
}

class TShape extends Shape {
    constructor(x, y) { super([new Block(x, y), new Block(x, y - 1), new Block(x + 1, y), new Block(x, y + 1)]); this.position = 0; }
    rotate() {
        let blocks = this.rotatePositions().map(p => new Block(p.x, p.y));
        this.clear(); this.addBlocks(blocks); this.position = this.getNextPosition();
    }
    rotatePositions() {
        let pos = this.getBlocks()[0].getPosition(); let x = pos.x, y = pos.y; let positions = [];
        switch(this.getNextPosition()){
            case 0: positions = [new Position(x, y), new Position(x, y - 1), new Position(x + 1, y), new Position(x, y + 1)]; break;
            case 1: positions = [new Position(x, y), new Position(x - 1, y), new Position(x, y - 1), new Position(x + 1, y)]; break;
            case 2: positions = [new Position(x, y), new Position(x, y - 1), new Position(x - 1, y), new Position(x, y + 1)]; break;
            case 3: positions = [new Position(x, y), new Position(x - 1, y), new Position(x, y + 1), new Position(x + 1, y)]; break;
        }
        return positions;
    }
    getNextPosition() { return (this.position + 1) % 4; }
}

class ZShape extends Shape {
    constructor(x, y) { super([new Block(x, y), new Block(x, y - 1), new Block(x + 1, y), new Block(x + 1, y + 1)]); this.position = 0; }
    rotate() {
        let blocks = this.rotatePositions().map(p => new Block(p.x, p.y));
        this.clear(); this.addBlocks(blocks); this.position = this.getNextPosition();
    }
    rotatePositions() {
        let pos = this.getBlocks()[0].getPosition(); let x = pos.x, y = pos.y; let positions = [];
        switch (this.getNextPosition()) {
            case 0: positions = [new Position(x, y), new Position(x, y - 1), new Position(x + 1, y), new Position(x + 1, y + 1)]; break;
            case 1: positions = [new Position(x, y), new Position(x - 1, y), new Position(x, y - 1), new Position(x + 1, y - 1)]; break;
        }
        return positions;
    }
    getNextPosition() { return (this.position + 1) % 2; }
}

class Line extends Shape {
    constructor(x, y) { super([new Block(x, y), new Block(x - 1, y), new Block(x + 1, y), new Block(x + 2, y)]); this.position = 0; }
    rotate() {
        let blocks = this.rotatePositions().map(p => new Block(p.x, p.y));
        this.clear(); this.addBlocks(blocks); this.position = this.getNextPosition();
    }
    rotatePositions() {
        let pos = this.getBlocks()[0].getPosition(); let x = pos.x, y = pos.y; let positions = [];
        switch (this.getNextPosition()) {
            case 0: positions = [new Position(x, y), new Position(x - 1, y), new Position(x + 1, y), new Position(x + 2, y)]; break;
            case 1: positions = [new Position(x, y), new Position(x, y - 1), new Position(x, y + 1), new Position(x, y + 2)]; break;
        }
        return positions;
    }
    getNextPosition() { return (this.position + 1) % 2; }
}

class Board {
  constructor() {
    this.blocks = [];
    this.shapes = [];
    this.interval = undefined;
    this.loopInterval = 600;
    this.score = 0;
    this.gameOver = false;
    this.init();
  }

  init() {
    $(".empty").each(function(index, ele) {
      let x = parseInt(index / 10);
      let y = index % 10;
      $(ele).css({ left: y * 30 + "px", top: x * 30 + "px" });
    });
    
    $("#new-game").click(() => this.newGame());
    
    $('.btn').on('touchstart', function(e) { e.preventDefault(); $(this).click(); });

    $("#left").click(() => this.inputLeft());
    $("#right").click(() => this.inputRight());
    $("#rotate").click(() => this.inputRotate());
    $("#down").click(() => this.inputFastFall());
    
    $(document).keydown((e) => {
        if(this.gameOver) return;
        if(e.which == 37) this.inputLeft(); 
        if(e.which == 39) this.inputRight(); 
        if(e.which == 38) this.inputRotate(); 
        if(e.which == 40) this.inputFastFall(); 
    });
  }

  newGame() {
    if(this.shapes.length > 0) this.shapes[0].clear();
    this.shapes = [];
    
    for (let block of this.blocks) block.destroy();
    this.blocks = [];
    
    this.gameOver = false;
    this.score = 0;
    $("#score").text("0");
    $("#banner").hide();
    
    this.spawnShape();
    this.initGameLoop(this.loopInterval);
  }

  initGameLoop(value) {
    if (this.interval) clearInterval(this.interval);
    this.interval = setInterval(() => this.gameLoop(), value);
  }

  gameLoop() {
    if(this.gameOver) return;
    this.updateShape();
    this.checkRowClearing();
  }

  updateShape() {
    if(this.shapes.length === 0) return;
    let shape = this.shapes[0];
    let nextPositions = shape.fallingPositions();

    if (this.arePositionsValid(nextPositions)) {
      shape.fall();
      shape.render();
    } else {
      this.freezeShape();
    }
  }

  freezeShape() {
      let shape = this.shapes.shift();
      for(let b of shape.getBlocks()) { this.blocks.push(b); }
      if(this.isGameOverCheck()) { this.endGame(); return; }
      this.spawnShape();
  }

  spawnShape() {
      let type = Math.floor(Math.random() * 5);
      let shape;
      switch(type) {
          case 0: shape = new Square(0, 4); break;
          case 1: shape = new LShape(0, 4); break;
          case 2: shape = new TShape(0, 4); break;
          case 3: shape = new ZShape(0, 4); break;
          case 4: shape = new Line(0, 4); break;
      }
      shape.init();
      shape.render();
      this.shapes.push(shape);
  }

  inputLeft() {
      if(!this.shapes.length) return;
      let shape = this.shapes[0];
      if(this.arePositionsValid(shape.leftPositions())) { shape.moveLeft(); shape.render(); }
  }
  
  inputRight() {
      if(!this.shapes.length) return;
      let shape = this.shapes[0];
      if(this.arePositionsValid(shape.rightPositions())) { shape.moveRight(); shape.render(); }
  }

  inputRotate() {
      if(!this.shapes.length) return;
      let shape = this.shapes[0];
      let newPositions = shape.rotatePositions();
      let valid = true;
      for(let p of newPositions) {
          if(p.x < 0 || p.x >= 20 || p.y < 0 || p.y >= 10 || this.isPositionOccupied(p)) valid = false;
      }
      if(valid) { shape.rotate(); shape.init(); shape.render(); }
  }

  inputFastFall() { this.updateShape(); }

  arePositionsValid(positions) {
      for(let p of positions) {
          if(p.x >= 20 || p.y < 0 || p.y >= 10) return false;
          if(this.isPositionOccupied(p)) return false;
      }
      return true;
  }

  isPositionOccupied(p) {
      for(let b of this.blocks) { if(b.x === p.x && b.y === p.y) return true; }
      return false;
  }

  checkRowClearing() {
      let rowsToClear = [];
      
      for(let r = 0; r < 20; r++) {
          let count = this.blocks.filter(b => b.x === r).length;
          if(count >= 10) rowsToClear.push(r);
      }
      
      if(rowsToClear.length > 0) {
          this.score += (rowsToClear.length * 100);
          $("#score").text(this.score);
          
          rowsToClear.forEach(rowIndex => {
              let blocksInRow = this.blocks.filter(b => b.x === rowIndex);
              blocksInRow.forEach(b => b.destroy());
              this.blocks = this.blocks.filter(b => b.x !== rowIndex);
          });
          
          rowsToClear.sort((a,b) => a - b);
          
          rowsToClear.forEach(clearedRow => {
              this.blocks.forEach(b => {
                  if(b.x < clearedRow) {
                      b.x += 1;
                      b.render();
                  }
              });
          });
      }
  }

  isGameOverCheck() {
      for(let b of this.blocks) { if(b.x <= 1) return true; }
      return false;
  }

  endGame() {
      this.gameOver = true;
      clearInterval(this.interval);
      $("#message").html("GAME<br>OVER");
      $("#new-game").text("TRY AGAIN");
      $("#banner").show();
  }
}

const board = new Board();

</script>
</body>
</html>
