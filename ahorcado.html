<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHORCADO - VINI'S WORLD</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        
        html { width:100%; height:100%; }
        body {
            width:100%; 
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;  
            font-family:'VT323','Segoe UI',monospace;
            background:#1e293b url('https://raw.githubusercontent.com/David-Code-0010/el.llamado.del.cielo/main/fondo_frutiger.png') center/cover fixed no-repeat;
            color:#f5f5f5;
            position:relative;
            font-weight:bold;
            font-style:italic;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background:linear-gradient(180deg, #1e293b 0%, #334155 70%, #475569 100%);
            z-index:-2;
        }
        body::after {
            content:''; position:fixed; inset:0;
            background: radial-gradient(ellipse at 20% 30%, rgba(245,245,245,0.06), transparent 40%),
                        radial-gradient(ellipse at 80% 70%, rgba(0,0,0,0.08), transparent 50%),
                        linear-gradient(rgba(245,245,245,0) 50%, rgba(0,0,0,0.03) 50%);
            background-size:100% 100%,100% 100%,100% 4px;
            pointer-events:none; z-index:-1;
        }

        .container { max-width:900px; margin:0 auto; position:relative; z-index:10; padding:15px; padding-top: 60px; }
        .top-bar {
            display:flex; justify-content:space-between; align-items:center;
            background:linear-gradient(180deg, #1e40af 0%, #1e3a8a 100%);
            border:2px solid rgba(245,245,245,0.35); border-radius:6px; color:#fdfdfd;
            font-size:1.3rem; margin-bottom:15px;
            box-shadow:0 4px 12px rgba(30,64,175,0.4), inset 0 1px 0 rgba(245,245,245,0.12);
            padding:8px 15px; height:48px;
        }
        .game-title {
            font-size:1.8rem;
            background:linear-gradient(to right, #fdfdfd 0%, #fdfdfd 45%, #cbd5e1 50%, #fdfdfd 55%, #fdfdfd 100%);
            background-size:200% auto; background-clip:text; -webkit-background-clip:text;
            -webkit-text-fill-color:transparent; animation:blueShine 3.5s linear infinite reverse;
        }
        @keyframes blueShine { to { background-position:200% center; } }

        .window {
            background:linear-gradient(180deg, rgba(241,245,249,0.96) 0%, rgba(226,232,240,0.94) 100%);
            border:1px solid rgba(30,41,59,0.25); border-radius:8px;
            box-shadow:0 4px 20px rgba(30,41,59,0.3), inset 0 1px 0 rgba(245,245,245,0.6);
            overflow:hidden;
        }
        .window-header {
            background:linear-gradient(180deg, #1e40af 0%, #1e3a8a 100%);
            color:#fdfdfd; padding:8px 12px; font-size:1.2rem; font-weight:bold;
            display:flex; justify-content:space-between; align-items:center;
            text-shadow:0 1px 3px rgba(0,0,0,0.5);
        }
        .window-body {
            padding:20px;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            min-height:65vh;
            background:#f8fafc;
        }

        .game-container {
            text-align:center; width:100%; max-width:500px;
        }

        /* --- CORRECCIÓN DEFINITIVA DEL MONITO --- */
        .hangman-figure {
            font-size: 80px; 
            margin: 0 auto 20px auto; 
            color: #1e293b;
            text-shadow: 0 4px 10px rgba(30,41,59,0.3);
            width: 250px;
            height: 250px; 
            white-space: pre; 
            /* 1. Forzamos una fuente idéntica en todos los dispositivos */
            font-family: 'Courier New', Courier, monospace; 
            /* 2. Reducimos la altura de línea de forma mucho más agresiva */
            line-height: 0.65;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden; 
        }

        .word-display {
            font-size:3.5rem; letter-spacing:12px; margin:20px 0;
            color:#1e40af; text-shadow:0 2px 8px rgba(30,64,175,0.4);
        }
        .letters {
            display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:20px 0;
        }
        .letter-btn {
            width:50px; height:50px; font-size:1.8rem;
            background:linear-gradient(180deg, #e2e8f0, #cbd5e1);
            border:2px solid #64748b; border-radius:10px;
            cursor:pointer; color:#1e293b;
            box-shadow:0 3px 8px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.6);
            transition:all 0.18s;
        }
        .letter-btn:hover {
            background:linear-gradient(180deg, #f1f5f9, #e2e8f0);
            transform:translateY(-3px); box-shadow:0 6px 15px rgba(30,64,175,0.3);
        }
        .letter-btn:disabled {
            opacity:0.5; cursor:not-allowed; transform:none;
            background:#cbd5e1; box-shadow:none;
        }

        .message {
            font-size:2.5rem; margin:10px 0; color:#1e40af;
            text-shadow:0 2px 8px rgba(30,64,175,0.4);
            min-height: 40px; 
            line-height: 1.2;
            padding: 0 10px;
        }

        .back-btn {
            position:absolute; top:15px; left:15px; z-index:30;
            background:linear-gradient(180deg,#fdfdfd,#e2e8f0); border:1px solid #64748b;
            border-radius:6px; padding:8px 16px; cursor:pointer;
            box-shadow:0 2px 8px rgba(0,0,0,0.2); transition:all 0.2s;
            text-decoration: none;
            color: #1e293b;
        }
        .back-btn:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(30,64,175,0.35); }

        @media (max-width:768px) {
            .container { padding: 10px; padding-top: 60px; }
            .window-header { flex-direction: column; gap: 10px; text-align: center; } 
            .window-body { min-height: auto; padding: 15px 5px; } 
            /* Ajuste también en la versión móvil */
            .hangman-figure { font-size:60px; width: 180px; height: 180px; margin-bottom: 10px; line-height: 0.65; } 
            .word-display { font-size: 2rem; letter-spacing: 5px; margin: 15px 0; }
            .letter-btn { width:40px; height:40px; font-size:1.4rem; }
            .message { font-size: 1.6rem; min-height: 30px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Volver</a>

    <div class="container">
        <div class="top-bar">
            <div class="game-title">AHORCADO</div>
            <div>Intentos: <span id="attempts">6</span></div>
        </div>

        <div class="window">
            <div class="window-header">
                <span>🔵 Adivina la palabra</span>
                <button onclick="location.reload()" style="background:none; border:none; color:white; font-family:inherit; font-size:1.1rem; cursor:pointer; font-weight:bold; padding: 5px;">↻ Reiniciar</button>
            </div>
            <div class="window-body">
                <div class="game-container">
                    <div class="hangman-figure" id="hangman"></div>
                    <div class="word-display" id="wordDisplay">_ _ _ _ _ _</div>
                    <div class="letters" id="letters"></div>
                    <div class="message" id="message"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const words = [
            "FRUTIGER", "AERO", "VINI", "CIELOS", "ANGEL", "AZUL", "MARINO", "CREMA", "SHARK", "ALGAS"
        ];

        let selectedWord = words[Math.floor(Math.random() * words.length)].toUpperCase();
        let guessedLetters = new Set();
        let attemptsLeft = 6;

        const hangmanStages = [
            "\n\n",
            "  O  \n\n",
            "  O  \n  |  \n",
            "  O  \n /|  \n",
            "  O  \n /|\\ \n",
            "  O  \n /|\\ \n /   ",
            "  O  \n /|\\ \n / \\ "
        ];

        const hangmanEl = document.getElementById("hangman");
        const wordDisplay = document.getElementById("wordDisplay");
        const lettersEl = document.getElementById("letters");
        const messageEl = document.getElementById("message");
        const attemptsEl = document.getElementById("attempts");

        function initGame() {
            guessedLetters.clear();
            attemptsLeft = 6;
            hangmanEl.textContent = hangmanStages[0]; 
            messageEl.textContent = "";
            attemptsEl.textContent = attemptsLeft;

            wordDisplay.textContent = selectedWord.split("").map(l => guessedLetters.has(l) ? l : "_").join(" ");

            lettersEl.innerHTML = "";
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter => {
                const btn = document.createElement("button");
                btn.className = "letter-btn";
                btn.textContent = letter;
                btn.onclick = () => guessLetter(letter);
                lettersEl.appendChild(btn);
            });
        }

        function guessLetter(letter) {
            if (guessedLetters.has(letter) || attemptsLeft <= 0) return;
            guessedLetters.add(letter);

            const buttons = document.querySelectorAll(".letter-btn");
            buttons.forEach(btn => {
                if (btn.textContent === letter) btn.disabled = true;
            });

            if (selectedWord.includes(letter)) {
                wordDisplay.textContent = selectedWord.split("").map(l => guessedLetters.has(l) ? l : "_").join(" ");
                if (!wordDisplay.textContent.includes("_")) {
                    messageEl.textContent = "¡Ganaste! La palabra era: " + selectedWord;
                    messageEl.style.color = "#10b981";
                    disableAllButtons();
                }
            } else {
                attemptsLeft--;
                attemptsEl.textContent = attemptsLeft;
                hangmanEl.textContent = hangmanStages[6 - attemptsLeft];
                if (attemptsLeft === 0) {
                    messageEl.textContent = "¡Perdiste! La palabra era: " + selectedWord;
                    messageEl.style.color = "#ef4444";
                    disableAllButtons();
                }
            }
        }

        function disableAllButtons() {
            document.querySelectorAll(".letter-btn").forEach(btn => btn.disabled = true);
        }

        initGame();
    </script>
</body>
</html>
