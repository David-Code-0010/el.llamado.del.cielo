<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PING PONG - VINI'S WORLD</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; }
        body {
            font-family:'VT323','Segoe UI',monospace;
            background:#0f172a url('https://raw.githubusercontent.com/David-Code-0010/el.llamado.del.cielo/main/fondo_frutiger.png') center/cover fixed no-repeat;
            color:#e0f2fe;
            position:relative;
            font-weight:bold;
            font-style:italic;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background:linear-gradient(180deg, #0f172a 0%, #1e293b 70%, #334155 100%);
            z-index:-2;
        }
        body::after {
            content:''; position:fixed; inset:0;
            background: radial-gradient(ellipse at 20% 30%, rgba(224,242,254,0.08), transparent 40%),
                        radial-gradient(ellipse at 80% 70%, rgba(0,0,0,0.12), transparent 50%),
                        linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.04) 50%);
            background-size:100% 100%,100% 100%,100% 4px;
            pointer-events:none; z-index:-1;
        }

        .container { max-width:900px; margin:0 auto; position:relative; z-index:10; padding:10px; }
        .top-bar {
            display:flex; justify-content:space-between; align-items:center;
            background:linear-gradient(180deg, #1e40af 0%, #1e3a8a 100%);
            border:2px solid rgba(224,242,254,0.4); border-radius:6px; color:#e0f2fe;
            font-size:1.3rem; margin-bottom:12px;
            box-shadow:0 4px 12px rgba(30,64,175,0.5), inset 0 1px 0 rgba(224,242,254,0.15);
            padding:8px 15px; height:48px;
        }
        .game-title {
            font-size:1.8rem;
            background:linear-gradient(to right, #e0f2fe 0%, #e0f2fe 45%, #7dd3fc 50%, #e0f2fe 55%, #e0f2fe 100%);
            background-size:200% auto; background-clip:text; -webkit-background-clip:text;
            -webkit-text-fill-color:transparent; animation:blueShine 3.5s linear infinite reverse;
        }
        @keyframes blueShine { to { background-position:200% center; } }

        .window {
            background:linear-gradient(180deg, rgba(30,41,59,0.94) 0%, rgba(15,23,42,0.92) 100%);
            border:1px solid rgba(224,242,254,0.25); border-radius:8px;
            box-shadow:0 4px 20px rgba(30,64,175,0.4), inset 0 1px 0 rgba(224,242,254,0.12);
            overflow:hidden;
        }
        .window-header {
            background:linear-gradient(180deg, #1e40af 0%, #1e3a8a 100%);
            color:#e0f2fe; padding:8px 12px; font-size:1.2rem; font-weight:bold;
            display:flex; justify-content:space-between; align-items:center;
            text-shadow:0 1px 3px rgba(0,0,0,0.6);
        }
        .window-body {
            padding:15px; background:#0f172a; position:relative;
            display:flex; align-items:center; justify-content:center;
            min-height:60vh;
        }

        canvas {
            background:#0f172a;
            border-radius:8px;
            box-shadow:0 0 25px rgba(59,130,246,0.5);
            max-width:100%;
        }

        .score {
            position:absolute; top:20px; left:50%; transform:translateX(-50%);
            font-size:3.5rem; color:#7dd3fc; text-shadow:0 0 15px #1e40af;
            z-index:20; pointer-events:none;
        }

        .back-btn {
            position:absolute; top:15px; left:15px; z-index:30;
            background:linear-gradient(180deg,#e0f2fe,#cbd5e1); border:1px solid #64748b;
            border-radius:6px; padding:8px 16px; cursor:pointer;
            box-shadow:0 2px 8px rgba(0,0,0,0.3); transition:all 0.2s;
        }
        .back-btn:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(30,64,175,0.4); }

        @media (max-width:768px) {
            .container { padding:5px; }
            .window-body { min-height:70vh; padding:10px; }
            .top-bar { font-size:1.1rem; height:42px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Volver</a>

    <div class="container">
        <div class="top-bar">
            <div class="game-title">PING PONG</div>
            <div>Puntuación: <span id="score">0 - 0</span></div>
        </div>

        <div class="window">
            <div class="window-header">
                <span>⚡ Azul Marino - ¡Juega contra la IA!</span>
                <button onclick="location.reload()">↻ Reiniciar</button>
            </div>
            <div class="window-body">
                <div class="score" id="scoreDisplay">0 - 0</div>
                <canvas id="canvas" width="800" height="500"></canvas>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');

        // Responsive canvas
        function resizeCanvas() {
            const maxW = Math.min(window.innerWidth * 0.92, 900);
            const aspect = 800 / 500;
            canvas.width = maxW;
            canvas.height = maxW / aspect;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Variables del juego
        const paddleWidth = 15;
        const paddleHeight = 100;
        const ballSize = 14;
        let playerY = canvas.height / 2 - paddleHeight / 2;
        let aiY = canvas.height / 2 - paddleHeight / 2;
        let ballX = canvas.width / 2;
        let ballY = canvas.height / 2;
        let ballSpeedX = 6;
        let ballSpeedY = 4;
        let playerScore = 0;
        let aiScore = 0;

        // Controles (teclado y mouse/touch para móvil)
        let upPressed = false;
        let downPressed = false;

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' || e.key === 'w') upPressed = true;
            if (e.key === 'ArrowDown' || e.key === 's') downPressed = true;
        });
        document.addEventListener('keyup', e => {
            if (e.key === 'ArrowUp' || e.key === 'w') upPressed = false;
            if (e.key === 'ArrowDown' || e.key === 's') downPressed = false;
        });

        // Soporte touch/mouse para móvil
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            playerY = e.clientY - rect.top - paddleHeight / 2;
        });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            playerY = e.touches[0].clientY - rect.top - paddleHeight / 2;
        });

        function draw() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Línea central
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 4;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Paletas
            ctx.fillStyle = '#60a5fa';
            ctx.shadowColor = '#3b82f6';
            ctx.shadowBlur = 15;
            ctx.fillRect(20, playerY, paddleWidth, paddleHeight);           // Jugador
            ctx.fillRect(canvas.width - 35, aiY, paddleWidth, paddleHeight); // IA

            // Pelota
            ctx.fillStyle = '#e0f2fe';
            ctx.shadowColor = '#7dd3fc';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballSize, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0; // reset sombra
        }

        function update() {
            // Movimiento jugador
            if (upPressed && playerY > 0) playerY -= 8;
            if (downPressed && playerY < canvas.height - paddleHeight) playerY += 8;

            // Movimiento IA (simple pero efectiva)
            if (aiY + paddleHeight / 2 < ballY) aiY += 5;
            if (aiY + paddleHeight / 2 > ballY) aiY -= 5;

            // Movimiento pelota
            ballX += ballSpeedX;
            ballY += ballSpeedY;

            // Rebote arriba/abajo
            if (ballY <= ballSize || ballY >= canvas.height - ballSize) {
                ballSpeedY = -ballSpeedY;
            }

            // Rebote paletas
            if (ballX <= 20 + paddleWidth && ballY > playerY && ballY < playerY + paddleHeight) {
                ballSpeedX = -ballSpeedX;
                ballSpeedY += (ballY - (playerY + paddleHeight / 2)) * 0.3; // efecto ángulo
            }
            if (ballX >= canvas.width - 35 - ballSize && ballY > aiY && ballY < aiY + paddleHeight) {
                ballSpeedX = -ballSpeedX;
                ballSpeedY += (ballY - (aiY + paddleHeight / 2)) * 0.3;
            }

            // Puntuación
            if (ballX < 0) {
                aiScore++;
                resetBall();
            }
            if (ballX > canvas.width) {
                playerScore++;
                resetBall();
            }

            scoreDisplay.textContent = `${playerScore} - ${aiScore}`;
        }

        function resetBall() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballSpeedX = (Math.random() > 0.5 ? 6 : -6);
            ballSpeedY = (Math.random() - 0.5) * 8;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        resetBall();
        gameLoop();
    </script>
</body>
</html>
