<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VINI'S WORLD - Frutiger Aero Complete</title>
  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
  
    <style>
        /* (Todo tu CSS anterior se mantiene igual hasta la sección de artifacts) */

        /* =========================================
           ARTIFACTS GRID - VERSIÓN MEJORADA
           ========================================= */
        .artifacts-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 15px 0;
        }
        .artifact-item {
            text-align: center;
            transition: transform 0.4s ease, filter 0.3s;
        }
        .artifact-item:hover {
            transform: scale(1.08) translateY(-8px);
            filter: brightness(1.15);
        }
        .artifact-label {
            display: block;
            margin-top: 8px;
            font-size: 0.9rem;
            color: #0072c6;
            font-weight: 700;
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
        }

        /* ====================== GAME BOY CLASSIC ====================== */
        .gameboy-css {
            width: 138px;
            height: 198px;
            background: linear-gradient(145deg, #00d4b8, #00a38f);
            border: 4px solid #ffffff;
            border-radius: 14px;
            box-shadow: 
                0 10px 20px rgba(0, 114, 198, 0.3),
                inset 0 6px 12px rgba(255,255,255,0.6),
                inset 0 -6px 12px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .gameboy-css::before {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px;
            height: 82px;
            background: #0a3d2f;
            border-radius: 6px;
            box-shadow: inset 0 0 20px rgba(0,255,180,0.4);
        }
        .gb-screen {
            position: absolute;
            top: 20px; left: 24px;
            width: 90px; height: 66px;
            background: #9be86e;
            border: 3px solid #0a3d2f;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'VT323', monospace;
            color: #0a3d2f;
            font-size: 9px;
            text-shadow: 0 0 4px #000;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.6);
        }
        .gb-logo {
            position: absolute;
            top: 92px; left: 22px;
            font-size: 7px;
            color: #ffffff;
            font-weight: 900;
            text-shadow: 1px 1px 2px #000;
        }

        /* ====================== GAME BOY ADVANCE ====================== */
        .gba-css {
            width: 168px;
            height: 98px;
            background: linear-gradient(135deg, #4dd0e1, #26a69a);
            border: 5px solid #ffffff;
            border-radius: 16px;
            box-shadow: 
                0 12px 25px rgba(0,114,198,0.35),
                inset 0 8px 15px rgba(255,255,255,0.7);
            position: relative;
        }
        .gba-screen-area {
            position: absolute;
            top: 14px; left: 18px;
            width: 96px; height: 64px;
            background: #a4d65e;
            border: 4px solid #1a3c1a;
            border-radius: 4px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        .gba-screen {
            width: 88px; height: 56px;
            background: linear-gradient(#c0ff9e, #8ed15a);
            margin: 4px;
            border-radius: 2px;
        }

        /* ====================== NES ====================== */
        .nes-css {
            width: 162px;
            height: 78px;
            background: linear-gradient(#2a2a2a, #1f1f1f);
            border: 4px solid #e0e0e0;
            border-radius: 8px;
            box-shadow: 
                0 10px 20px rgba(0,114,198,0.4),
                inset 0 4px 10px rgba(255,255,255,0.2);
            position: relative;
        }
        .nes-stripe {
            position: absolute;
            top: 8px; left: 8px; right: 8px;
            height: 62px;
            background: linear-gradient(#f0f0f0, #d0d0d0);
            border: 2px solid #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
        }
        .nes-black-zone {
            width: 82px; height: 42px;
            background: #111;
            border: 3px solid #444;
            border-radius: 3px;
            position: relative;
        }
        .nes-dpad, .nes-btns {
            position: absolute;
            top: 50%; transform: translateY(-50%);
        }
        .nes-btn {
            background: radial-gradient(#ff5555, #c00);
            box-shadow: 0 2px 4px #000;
        }

        /* ====================== OLD PHONE ====================== */
        .phone-css {
            width: 72px;
            height: 148px;
            background: linear-gradient(145deg, #b0b0b0, #7a7a7a);
            border: 4px solid #f0f0f0;
            border-radius: 18px;
            box-shadow: 
                0 12px 25px rgba(0,114,198,0.3),
                inset 0 6px 12px rgba(255,255,255,0.8);
            position: relative;
            overflow: hidden;
        }
        .phone-antenna {
            position: absolute;
            top: -18px; right: 12px;
            width: 6px; height: 22px;
            background: #555;
            border-radius: 4px 4px 0 0;
            box-shadow: 0 0 8px #00ffff;
        }
        .phone-screen {
            width: 54px; height: 38px;
            background: linear-gradient(#00ddff, #00aaff);
            margin: 14px auto 8px;
            border: 3px solid #222;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 8px;
            font-weight: bold;
            text-shadow: 0 0 6px #fff;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.6);
        }
        .phone-keys {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            width: 52px;
            margin: 0 auto;
        }
        .phone-key {
            height: 9px;
            background: linear-gradient(#ddd, #999);
            border: 1px solid #555;
            border-radius: 2px;
            box-shadow: inset 0 2px 3px rgba(255,255,255,0.6);
        }

        /* RESPONSIVE */
        @media (max-width: 700px) {
            .artifact-item { transform: scale(0.95); }
            .gameboy-css { width: 115px; height: 165px; }
            .gba-css { width: 140px; height: 82px; }
            .nes-css { width: 135px; height: 65px; }
            .phone-css { width: 60px; height: 124px; }
        }
    </style>
</head>
<body>
    <!-- ... (todos tus stickers, top-bar, lore, social, arcade, paint y credits se mantienen exactamente igual) ... -->

                                <div class="nes-dpad"><div class="v"></div><div class="h"></div></div>
                                <span style="color:#ff3333; font-size:1.1rem; position:absolute; right:8px; top:10px;">♥</span>
                                <div class="nes-btns" style="right:8px;">
                                    <div class="nes-btn"></div>
                                    <div class="nes-btn"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <span class="artifact-label">NES</span>
                </div>

                <!-- OLD PHONE -->
                <div class="artifact-item">
                    <div class="phone-css">
                        <div class="phone-antenna"></div>
                        <div class="phone-screen">CALL ME</div>
                        <div class="phone-keys">
                            <div class="phone-key"></div><div class="phone-key"></div><div class="phone-key"></div>
                            <div class="phone-key"></div><div class="phone-key"></div><div class="phone-key"></div>
                            <div class="phone-key"></div><div class="phone-key"></div><div class="phone-key"></div>
                        </div>
                    </div>
                    <span class="artifact-label">Old Phone</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ... resto de tu código (paint, credits, script) sin cambios ... -->
</body>
</html>
